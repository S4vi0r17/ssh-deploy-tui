app_name: "S4v!0r Deploy"

ssh:
  host: tu-ip-o-dominio
  port: 22
  user: tu-usuario
  identity_file: ~/.ssh/id_rsa  # Ruta a tu llave privada SSH
  # init_cmd: Comando que se ejecuta antes de cada comando SSH (necesario porque las sesiones
  # SSH no-interactivas no cargan .bashrc). Usa esto para cargar nvm, agregar bun/pnpm al PATH,
  # o configurar deploy keys de Git.
  init_cmd: "source ~/.nvm/nvm.sh && export PATH=$HOME/.bun/bin:$HOME/.local/share/pnpm:$PATH && export GIT_SSH_COMMAND='ssh -i ~/.ssh/github_deploy_key -o IdentitiesOnly=yes'"

# Proyectos en el VPS
projects:
  mi-backend:
    name: "Mi Backend"
    path: /var/www/html/mi-backend
    type: pm2
    branch: main
    package_manager: pnpm
    install_cmd: pnpm install
    build_cmd: pnpm build
    pm2_name: mi-backend

  mi-frontend:
    name: "Mi Frontend"
    path: /var/www/html/mi-frontend
    type: static
    branch: main
    package_manager: bun
    install_cmd: bun install
    build_cmd: bun run build
    output_dir: dist

# Configuracion de Nginx
nginx:
  config_path: /etc/nginx/nginx.conf
  sites_path: /etc/nginx/sites-available

# Tunnels SSH (port forwarding local)
# Accede desde el menu principal > Tunnels
tunnels:
  - name: "MySQL CRS"
    local_port: 3306      # puerto en tu maquina
    remote_host: "127.0.0.1"  # host desde el servidor
    remote_port: 3306     # puerto en el servidor
    auto_start: true      # activar automaticamente al conectar
